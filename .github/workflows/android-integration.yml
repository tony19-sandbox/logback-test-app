name: Android Integration Tests

# Runs the instrumented (integration) tests for logback-android on an Android
# emulator. Unlike the "Android CI" workflow (which assembles the app and runs
# the JVM unit tests), this workflow builds the app with the bundled
# logback-android library and exercises it end-to-end on a device.
#
# The emulator matrix covers every API level the app supports: minSdk (21)
# through targetSdk (35). API 21, 22, and 27 have no google_apis x86_64 system
# image (google_apis is x86-only at those levels), so they run against the AOSP
# "default" image; the tests only need core Android plus LogcatAppender, so
# Google APIs are not required.

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

# Cancel superseded runs on the same ref to save emulator minutes.
concurrency:
  group: integration-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  integration-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - { api-level: 21, target: default,     arch: x86_64 }
          - { api-level: 22, target: default,     arch: x86_64 }
          - { api-level: 23, target: google_apis, arch: x86_64 }
          - { api-level: 24, target: google_apis, arch: x86_64 }
          - { api-level: 25, target: google_apis, arch: x86_64 }
          - { api-level: 26, target: google_apis, arch: x86_64 }
          - { api-level: 27, target: default,     arch: x86_64 }
          - { api-level: 28, target: google_apis, arch: x86_64 }
          - { api-level: 29, target: google_apis, arch: x86_64 }
          - { api-level: 30, target: google_apis, arch: x86_64 }
          - { api-level: 31, target: google_apis, arch: x86_64 }
          - { api-level: 32, target: google_apis, arch: x86_64 }
          - { api-level: 33, target: google_apis, arch: x86_64 }
          - { api-level: 34, target: google_apis, arch: x86_64 }
          - { api-level: 35, target: google_apis, arch: x86_64 }
    steps:
      - uses: actions/checkout@v7

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      # KVM is required for hardware-accelerated (x86_64) emulators on Linux.
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      # Build the app (with the logback-android AAR) and the androidTest APK
      # before booting the emulator so build failures fail fast.
      - name: Assemble app and instrumentation tests
        run: ./gradlew assembleDebug assembleDebugAndroidTest --stacktrace

      - name: Run integration tests on emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ matrix.api-level }}
          target: ${{ matrix.target }}
          arch: ${{ matrix.arch }}
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -no-snapshot -noaudio -no-boot-anim
          disable-animations: true
          script: ./gradlew connectedDebugAndroidTest --stacktrace

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: integration-test-reports-api${{ matrix.api-level }}-${{ matrix.target }}
          path: |
            app/build/reports/androidTests
            app/build/outputs/androidTest-results
          if-no-files-found: ignore
