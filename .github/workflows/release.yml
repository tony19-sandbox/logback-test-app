name: Release

# Builds this test app and attaches its APKs to a published GitHub Release, so
# logback-android's CI can reference a stable, versioned checkout of the
# integration-test project (instead of a moving branch) and download prebuilt
# APKs to drive on an emulator.
#
# This runs when a GitHub Release is published (create the release + tag from
# the GitHub UI or `gh release create`, as a draft or directly). The workflow
# then builds the debug, release, and androidTest (instrumentation) APKs and
# uploads them as assets to that release. A workflow_dispatch entry point is
# also provided to (re)attach assets to an existing release by tag.

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing release tag to (re)attach APKs to (e.g. v0.0.2)'
        required: true
        type: string

# Serialize runs so two never race to upload assets to the same release.
concurrency:
  group: release-${{ github.workflow }}-${{ github.event.release.tag_name || inputs.tag }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      # Resolve the tag/version once so later steps can share it.
      #   - release event -> tag is github.event.release.tag_name (e.g. v0.0.2)
      #   - dispatch       -> tag is inputs.tag
      - name: Resolve release tag
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="${{ inputs.tag }}"
          else
            tag="${{ github.event.release.tag_name }}"
          fi
          version="${tag#v}"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "Releasing ${tag} (version ${version})"

      # Check out the release's tag so the APKs are built from the released
      # source, not whatever the default branch points at now.
      - uses: actions/checkout@v7
        with:
          ref: ${{ steps.version.outputs.tag }}

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      # Build the app (bundling the logback-android AAR), the release APK, and
      # the instrumentation APK. Building here doubles as a gate: a broken tag
      # fails the release instead of shipping bad artifacts.
      - name: Assemble APKs
        run: ./gradlew assembleDebug assembleRelease assembleDebugAndroidTest --stacktrace

      # Give the artifacts stable, version-stamped names so consumers can pin a
      # predictable download URL.
      - name: Stage release artifacts
        run: |
          version="${{ steps.version.outputs.version }}"
          mkdir -p release-artifacts
          cp app/build/outputs/apk/debug/app-debug.apk \
            "release-artifacts/logback-test-app-${version}-debug.apk"
          cp app/build/outputs/apk/release/app-release-unsigned.apk \
            "release-artifacts/logback-test-app-${version}-release-unsigned.apk"
          cp app/build/outputs/apk/androidTest/debug/app-debug-androidTest.apk \
            "release-artifacts/logback-test-app-${version}-androidTest.apk"
          ls -l release-artifacts

      - name: Upload APKs to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ steps.version.outputs.tag }}" \
            release-artifacts/* --clobber
