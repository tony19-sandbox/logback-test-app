# Configuration for CircleCI
# https://circleci.com/gh/tony19-sandbox/logback-test-app

version: 2.1

jobs:
  build:
    docker:
      # cimg/android 2024.01.x ships JDK 17 (default) and Android platform 34
      - image: cimg/android:2024.01.1
    working_directory: ~/code
    steps:
      # This is a public repo, so clone over HTTPS instead of the CircleCI
      # SSH `checkout` step (which depends on a project deploy key).
      - run:
          name: Checkout (HTTPS)
          command: |
            git clone "https://github.com/${CIRCLE_PROJECT_USERNAME}/${CIRCLE_PROJECT_REPONAME}.git" .
            git fetch --force origin "${CIRCLE_SHA1}" || true
            git checkout --force "${CIRCLE_SHA1}"
      - run:
          name: Java version
          command: java -version
      - run:
          name: Build
          command: ./gradlew assembleDebug assembleRelease --stacktrace
      - persist_to_workspace:
          root: .
          paths:
            - .
      - store_artifacts:
          path: app/build/outputs
          destination: outputs

  unit_test:
    docker:
      - image: cimg/android:2024.01.1
    working_directory: ~/code
    steps:
      - attach_workspace:
          at: ~/code
      - run:
          name: Unit tests
          command: ./gradlew testDebugUnitTest --stacktrace
      - store_artifacts:
          path: app/build/reports/tests
          destination: reports
      - store_test_results:
          path: app/build/test-results

workflows:
  build_and_test:
    jobs:
      - build
      - unit_test:
          requires:
            - build
